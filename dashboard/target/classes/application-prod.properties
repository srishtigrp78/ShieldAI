# Production Profile - AWS RDS PostgreSQL Configuration

# AWS RDS PostgreSQL Configuration
# RDS Instance: db.t3.micro, 20GB SSD
# DB Name: shieldai_prod, User: shieldai_admin
# Security Group: Allow inbound 5432 from Elastic Beanstalk SG only
spring.datasource.url=jdbc:postgresql://${RDS_HOSTNAME:localhost}:${RDS_PORT:5432}/${RDS_DB_NAME:shieldai_prod}
spring.datasource.username=${RDS_USERNAME:shieldai_admin}
spring.datasource.password=${RDS_PASSWORD:#{null}}
spring.datasource.driver-class-name=org.postgresql.Driver

# AWS Secrets Manager Configuration (commented - requires AWS SDK)
# spring.cloud.aws.secretsmanager.enabled=true
# spring.cloud.aws.secretsmanager.name=shieldai/rds/credentials
# spring.datasource.password=${aws.secretsmanager.get-secret-value.shieldai-rds-password}

# JPA Production Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway Production Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# Connection Pool Configuration for Production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:dashing.ayu.2378@gmail.com}
spring.mail.password=${GMAIL_PASSWORD:ystm oooa ldls cemg}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server Configuration
server.port=${PORT:8080}

# Production Logging Configuration
logging.level.com.shieldai=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.root=WARN